<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emoticons Ultra</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: 'Inter', sans-serif; background: #f3f4f6; }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  .kaomoji-item:hover { background-color: #e5e7eb; cursor: pointer; transform: scale(1.05); transition: transform 0.1s; }
</style>
</head>
<body class="flex flex-col items-center p-6 gap-6">

<h1 class="text-4xl md:text-5xl font-extrabold text-gray-800 text-center">Emoticons Ultra</h1>
<p class="text-gray-600 max-w-xl text-center">
Build full kaomojis, single symbols, or bulk lists. Select parts, generate randomly, or copy with one click.
</p>

<div class="bg-white p-6 md:p-8 rounded-3xl shadow-xl w-full max-w-6xl flex flex-col gap-6">

  <!-- Output -->
  <div id="output" class="text-6xl md:text-8xl font-bold text-gray-700 text-center p-6 rounded-xl bg-gray-100">(вҳүвҖҝвҳү)</div>

  <!-- Single Symbol Toggle -->
  <div class="flex items-center justify-center gap-3 mb-4">
    <input type="checkbox" id="singleSymbolMode" class="w-5 h-5">
    <label for="singleSymbolMode" class="font-semibold text-gray-700">Single Symbol Mode (Extra Only)</label>
  </div>

  <!-- Part Selectors Grid -->
  <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-6 gap-4">
    <div><label class="block font-semibold mb-1">Left Arm</label><select id="leftArm" class="w-full p-2 border rounded-lg"></select></div>
    <div><label class="block font-semibold mb-1">Eyes</label><select id="eyes" class="w-full p-2 border rounded-lg"></select></div>
    <div><label class="block font-semibold mb-1">Mouth</label><select id="mouth" class="w-full p-2 border rounded-lg"></select></div>
    <div><label class="block font-semibold mb-1">Cheeks</label><select id="cheeks" class="w-full p-2 border rounded-lg"></select></div>
    <div><label class="block font-semibold mb-1">Right Arm</label><select id="rightArm" class="w-full p-2 border rounded-lg"></select></div>
    <div><label class="block font-semibold mb-1">Extra (Star/Heart/etc.)</label><select id="extra" class="w-full p-2 border rounded-lg"></select></div>
  </div>

  <!-- Buttons -->
  <div class="flex flex-wrap gap-4 justify-center">
    <button onclick="generateKaomoji()" class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl">Generate</button>
    <button onclick="surpriseMe()" class="px-6 py-2 bg-purple-600 hover:bg-purple-700 text-white font-bold rounded-xl">Surprise Me!</button>
    <button onclick="copyKaomoji()" class="px-6 py-2 bg-green-600 hover:bg-green-700 text-white font-bold rounded-xl">Copy</button>
  </div>

  <!-- Bulk generator -->
  <div class="flex flex-col md:flex-row gap-4 items-center justify-center mt-4">
    <input type="number" id="bulkCount" value="100" min="1" max="1000" class="p-2 border rounded-lg text-center w-32">
    <button onclick="generateBulkKaomoji()" class="px-6 py-2 bg-gray-700 hover:bg-gray-800 text-white font-bold rounded-xl">Generate Bulk</button>
    <button onclick="copyAllKaomoji()" class="px-6 py-2 bg-gray-500 hover:bg-gray-600 text-white font-bold rounded-xl">Copy All</button>
  </div>

  <!-- Bulk output -->
  <div id="bulkOutput" class="bg-gray-100 p-4 rounded-xl max-h-96 overflow-y-auto flex flex-wrap gap-2 no-scrollbar"></div>

</div>

<script>
  // ------------------- PARTS -------------------
  const leftArms = ["", "(", "пјҲ", "в•°(", "(гҒҘ", "(гҒЈ", "(пҫү", "гғҪ(", "К•", "гғҫ", "Оө", "Щ©(", "(*", "гғҪ", "(вҢ’", "в•ӯ("];
  const rightArms = ["", ")", "пјү", ")в•Ҝ", ")гҒҘ", ")гҒЈ", ")пҫү", ")гғҺ", "К”", "пҫү", "Щ©)", "(*", ")вҢ’", ")в•®"];
  const eyesList = ["", "^","В°","вҖў","В¬","аІ ","Вҙ","x","X","T","аІҘ","вҠҷ","вҳү","вҷҘ","вқӨ","вҷЎ","вңҝ","вҳҶ","в—•","вҖў","o","u","в—ү","вҲӘ","вҢ’","вҲҳ","вҢЈ"];
  const mouths = ["", "_","o","O","Пү","п№Ҹ","вҖҝ","в–і","вҲҖ","3","пёҝ","Р”","зҡҝ","зӣҠ","Рҙ","Оө","Р·","v","в–ҫ","б—қ","в–Ў","в—Ў","в•Ҝ"];
  const cheeks = ["", "///","пҪҖ","Вҙ","вҷҘ","вҷЎ","вңҝ","o","пҪЎ","В°","*",".","~"];
  const extras = ["", "пҫү*:пҪҘпҫҹвң§","вҷҘ","вҷЎ","вңҝ","вҳҶ","вң§","вҳ…","!!","~","вҷӘ","вҷ«","вҳҶпҫҹ.*пҪҘпҪЎпҫҹ","гғҺ","(гҒЈЛҳР·(ЛҳвҢЈЛҳ )","!","?","^.^","вҳҶ","вҳ…"];

  function getRandom(list){ return list[Math.floor(Math.random()*list.length)]; }

  // ------------------- GENERATE -------------------
  function generateKaomojiString(random=false){
    const singleMode = document.getElementById("singleSymbolMode").checked;
    if(singleMode){
      return random ? getRandom(extras) : document.getElementById("extra").value || " ";
    }

    let l = random ? getRandom(leftArms) : document.getElementById("leftArm").value;
    let r = random ? getRandom(rightArms) : document.getElementById("rightArm").value;
    let e = random ? getRandom(eyesList) : document.getElementById("eyes").value;
    let m = random ? getRandom(mouths) : document.getElementById("mouth").value;
    let c = random ? getRandom(cheeks) : document.getElementById("cheeks").value;
    let ex = random ? getRandom(extras) : document.getElementById("extra").value;

    let kaomoji = "";
    if(l) kaomoji += l;
    if(e) kaomoji += e;
    if(c) kaomoji += c;
    if(m) kaomoji += m;
    if(c) kaomoji += c;
    if(e) kaomoji += e;
    if(r) kaomoji += r;
    if(ex) kaomoji += ex;
    return kaomoji || " ";
  }

  function generateKaomoji(){ document.getElementById("output").textContent = generateKaomojiString(); }
  function surpriseMe(){ document.getElementById("output").textContent = generateKaomojiString(true); }
  function copyKaomoji(){ navigator.clipboard.writeText(document.getElementById("output").textContent); }
  function generateBulkKaomoji(){
    const count = parseInt(document.getElementById("bulkCount").value);
    const bulkDiv = document.getElementById("bulkOutput"); bulkDiv.innerHTML="";
    for(let i=0;i<count;i++){
      const k = generateKaomojiString(true);
      const span=document.createElement("span"); span.textContent=k;
      span.className="kaomoji-item p-1 rounded-md";
      span.onclick=()=>{ document.getElementById("output").textContent=k; };
      bulkDiv.appendChild(span);
    }
  }
  function copyAllKaomoji(){
    const all = Array.from(document.getElementById("bulkOutput").children).map(c=>c.textContent).join("\n");
    navigator.clipboard.writeText(all);
  }

  // ------------------- INIT SELECTS -------------------
  function fillSelect(id,list,defaultValue=""){ const sel=document.getElementById(id); sel.innerHTML="";
    list.forEach(item=>{ const opt=document.createElement("option"); opt.value=item; opt.textContent=item||"None"; sel.appendChild(opt); });
    if(defaultValue) sel.value=defaultValue;
  }
  fillSelect("leftArm", leftArms); fillSelect("rightArm", rightArms);
  fillSelect("eyes", eyesList,"вҳү"); fillSelect("mouth", mouths,"вҖҝ");
  fillSelect("cheeks", cheeks); fillSelect("extra", extras);

  generateKaomoji();
</script>
</body>
</html>
