<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emoticons Ultra</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Toast Notification -->
  <div id="toast" class="toast" role="alert" aria-live="polite"></div>

  <!-- Header -->
  <h1 class="title">Emoticons Ultra</h1>
  <p class="lead">
    Build full Emoticons, single symbols, or bulk lists. Select parts, generate randomly, or copy instantly.
  </p>

  <!-- Main Card -->
  <div class="main-card">
    <!-- Output Display -->
    <div id="output" class="output" role="region" aria-live="polite" aria-label="Generated emoticon"></div>

    <!-- Single Symbol Toggle -->
    <div class="toggle-row">
      <input type="checkbox" id="singleSymbolMode" aria-describedby="singleModeDesc">
      <label for="singleSymbolMode" class="label-strong">Single Symbol Mode</label>
      <span id="singleModeDesc" class="muted-note">(Shows only the Extra symbol)</span>
    </div>

    <!-- Part Selectors -->
    <div class="select-grid">
      <div>
        <label for="leftArm" class="field-label">Left Arm</label>
        <select id="leftArm" class="select" aria-label="Select left arm"></select>
      </div>
      <div>
        <label for="eyes" class="field-label">Eyes</label>
        <select id="eyes" class="select" aria-label="Select eyes"></select>
      </div>
      <div>
        <label for="mouth" class="field-label">Mouth</label>
        <select id="mouth" class="select" aria-label="Select mouth"></select>
      </div>
      <div>
        <label for="cheeks" class="field-label">Cheeks</label>
        <select id="cheeks" class="select" aria-label="Select cheeks"></select>
      </div>
      <div>
        <label for="rightArm" class="field-label">Right Arm</label>
        <select id="rightArm" class="select" aria-label="Select right arm"></select>
      </div>
      <div>
        <label for="extra" class="field-label">Extra</label>
        <select id="extra" class="select" aria-label="Select extra symbol"></select>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="btn-row">
      <button id="surpriseBtn" class="btn btn-orange" aria-label="Generate random emoticon">
        Surprise Me
      </button>
      <button id="copyBtn" class="btn btn-green" aria-label="Copy current emoticon to clipboard">
        Copy
      </button>
    </div>

    <!-- Bulk Generator Controls -->
    <div class="bulk-row">
      <label for="bulkCount" class="sr-only">Number of emoticons to generate</label>
      <input 
        type="number" 
        id="bulkCount" 
        value="100" 
        min="1" 
        max="1000" 
        class="number-input" 
        aria-label="Bulk count"
      >
      <button id="generateBulkBtn" class="btn btn-blue" aria-label="Generate multiple random emoticons">
        Generate Many
      </button>
      <button id="copyAllBtn" class="btn btn-yellow" aria-label="Copy all generated emoticons">
        Copy All
      </button>
    </div>

    <!-- Bulk Output -->
    <div id="bulkOutput" class="bulk-output no-scrollbar" role="region" aria-label="Bulk generated emoticons"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
