<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaomoji Master ✨</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
    body {
        font-family: 'Inter', sans-serif;
        margin: 0; padding: 0;
        transition: background 0.3s, color 0.3s;
        background: linear-gradient(135deg, #f0f4f8, #c1c1c1);
        color: #111;
    }
    body.dark { background: linear-gradient(135deg, #1f2937, #111827); color: #f3f4f6; }
    .kaomoji-output {
        font-size: 5rem; text-align: center; padding: 2rem;
        border-radius: 2rem; background: #e5e7eb; color: #111;
        min-height: 8rem; display: flex; align-items: center; justify-content: center;
        transition: all 0.2s;
    }
    body.dark .kaomoji-output { background: #374151; color: #f3f4f6; }
    .kaomoji-output.bounce { animation: bounce 0.3s ease; }
    @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
    .symbol-palette-item { cursor: pointer; padding: 0.5rem; margin:0.25rem; border-radius:0.5rem; display:inline-block; transition: all 0.1s; font-size:1.5rem; }
    .symbol-palette-item:hover { background: #e5e7eb; transform: scale(1.2); }
    body.dark .symbol-palette-item:hover { background: #374151; }
    .btn { cursor:pointer; transition: all 0.2s; }
    .btn:hover { transform: translateY(-2px); }
</style>
</head>
<body class="flex flex-col items-center p-4 gap-6 min-h-screen">

<h1 class="text-4xl md:text-5xl font-extrabold text-center">Kaomoji Master ✨</h1>
<p class="max-w-xl text-center text-gray-700 dark:text-gray-300">
Live-edit, drag & drop, favorite, and bulk-generate kaomojis!
</p>

<div class="kaomoji-output" id="output">(◕‿◕✿)</div>

<!-- Kaomoji Parts -->
<div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4 w-full max-w-5xl">
    <select id="ears" class="p-2 border rounded-lg"></select>
    <select id="leftArm" class="p-2 border rounded-lg"></select>
    <select id="eyes" class="p-2 border rounded-lg"></select>
    <select id="cheeks" class="p-2 border rounded-lg"></select>
    <select id="mouth" class="p-2 border rounded-lg"></select>
    <select id="rightArm" class="p-2 border rounded-lg"></select>
    <select id="extras" class="p-2 border rounded-lg"></select>
</div>

<!-- Buttons -->
<div class="flex flex-wrap gap-4 justify-center mt-4">
    <button id="randomBtn" class="px-6 py-2 bg-purple-600 hover:bg-purple-700 text-white font-bold rounded-xl btn">Random</button>
    <button id="copyBtn" class="px-6 py-2 bg-green-600 hover:bg-green-700 text-white font-bold rounded-xl btn">Copy</button>
    <button id="undoBtn" class="px-6 py-2 bg-gray-500 hover:bg-gray-600 text-white font-bold rounded-xl btn">Undo</button>
    <button id="redoBtn" class="px-6 py-2 bg-gray-500 hover:bg-gray-600 text-white font-bold rounded-xl btn">Redo</button>
</div>

<!-- Symbol Palette -->
<h2 class="text-2xl font-bold mt-6 text-center">Symbol Palette</h2>
<div class="flex flex-wrap justify-center gap-2" id="palette"></div>

<script>
const kaomojiParts = {
    ears: ["","(","（","[","｛","<","{","ʕ","ヾ"],
    leftArm: ["","╰(","(づ","(っ","(ﾉ","ヽ("],
    eyes: ["","^","°","•","⊙","♥","☆","◕","o"],
    cheeks: ["","///","｀","´","♥","✿"],
    mouth: ["","_","o","ω","﹏","‿","△"],
    rightArm: ["",")","）",")╯",")づ",")っ"],
    extras: ["","ﾉ*:･ﾟ✧","♥","♡","✿","☆"]
};

// Elements
const output = document.getElementById('output');
const selects = ["ears","leftArm","eyes","cheeks","mouth","rightArm","extras"].map(id=>document.getElementById(id));
const palette = document.getElementById('palette');
let history = []; let historyPos = -1;

// Fill selects
selects.forEach((sel,i)=>{
    const part = Object.values(kaomojiParts)[i];
    part.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s; opt.textContent = s||"None"; sel.appendChild(opt);
    });
    sel.addEventListener('change', renderKaomoji);
});

// Render kaomoji
function renderKaomoji(){
    const k = selects.map(s=>s.value).join('');
    output.textContent = k||"(☉‿☉)";
    saveHistory(output.textContent);
}

// Random kaomoji
document.getElementById('randomBtn').addEventListener('click', ()=>{
    selects.forEach((sel,i)=>{
        const part = Object.values(kaomojiParts)[i];
        sel.value = part[Math.floor(Math.random()*part.length)];
    });
    renderKaomoji();
});

// Copy with animation
document.getElementById('copyBtn').addEventListener('click', ()=>{
    navigator.clipboard.writeText(output.textContent);
    output.classList.add('bounce');
    setTimeout(()=>output.classList.remove('bounce'),300);
});

// Undo / Redo
function saveHistory(k){
    if(history[historyPos]===k) return;
    history = history.slice(0,historyPos+1);
    history.push(k);
    historyPos = history.length-1;
}
document.getElementById('undoBtn').addEventListener('click', ()=>{
    if(historyPos>0){ historyPos--; output.textContent = history[historyPos]; }
});
document.getElementById('redoBtn').addEventListener('click', ()=>{
    if(historyPos<history.length-1){ historyPos++; output.textContent = history[historyPos]; }
});

// Render palette
const allSymbols = [...new Set([].concat(...Object.values(kaomojiParts).map(arr=>arr.filter(s=>s))) )].sort();
allSymbols.forEach(s=>{
    const span = document.createElement('span');
    span.textContent = s; span.className="symbol-palette-item";
    span.draggable = true;
    span.addEventListener('click', ()=>{ output.textContent+=s; saveHistory(output.textContent); });
    span.addEventListener('dragstart', e=>{ e.dataTransfer.setData('text/plain',s); });
    output.addEventListener('dragover', e=>{ e.preventDefault(); });
    output.addEventListener('drop', e=>{ e.preventDefault(); const sym = e.dataTransfer.getData('text/plain'); output.textContent += sym; saveHistory(output.textContent); });
    palette.appendChild(span);
});

// Initial render
renderKaomoji();
</script>
</body>
</html>
