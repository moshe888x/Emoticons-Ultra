<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Emoticons Ultra</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg,#fef9f0,#f3f4f6); margin:0; padding:0; }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  .kaomoji-item:hover { background-color: #e5e7eb; cursor: pointer; transform: scale(1.1); transition: transform 0.15s; }
  .card { transition: transform 0.2s, box-shadow 0.2s; }
  .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.12); }
  .pop { transform: scale(1.04); transition: transform 0.12s; }
</style>
</head>
<body class="flex flex-col items-center p-6 gap-6 min-h-screen">

<h1 class="text-4xl md:text-5xl font-extrabold text-gray-800 text-center">Emoticons Ultra</h1>
<p class="text-gray-600 max-w-xl text-center">
  Build full kaomojis, single symbols, or bulk lists. Select parts, generate randomly, or copy instantly.
</p>

<div class="bg-white p-6 md:p-8 rounded-3xl shadow-xl w-full max-w-6xl flex flex-col gap-6 card">
  <div id="output" class="text-6xl md:text-8xl font-bold text-gray-700 text-center p-6 rounded-xl bg-gray-100">(вҳүвҖҝвҳү)</div>

  <div class="flex items-center justify-center gap-3 mb-4">
    <input type="checkbox" id="singleSymbolMode" class="w-5 h-5">
    <label for="singleSymbolMode" class="font-semibold text-gray-700">Single Symbol Mode (Extra Only)</label>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-6 gap-4">
    <div><label class="block font-semibold mb-1">Left Arm</label><select id="leftArm" class="w-full p-2 border rounded-lg"></select></div>
    <div><label class="block font-semibold mb-1">Eyes</label><select id="eyes" class="w-full p-2 border rounded-lg"></select></div>
    <div><label class="block font-semibold mb-1">Mouth</label><select id="mouth" class="w-full p-2 border rounded-lg"></select></div>
    <div><label class="block font-semibold mb-1">Cheeks</label><select id="cheeks" class="w-full p-2 border rounded-lg"></select></div>
    <div><label class="block font-semibold mb-1">Right Arm</label><select id="rightArm" class="w-full p-2 border rounded-lg"></select></div>
    <div><label class="block font-semibold mb-1">Extra (Star/Heart/etc.)</label><select id="extra" class="w-full p-2 border rounded-lg"></select></div>
  </div>

  <div class="flex flex-wrap gap-4 justify-center mt-4">
    <button onclick="surpriseMe()" class="px-6 py-2 bg-orange-500 hover:bg-orange-700 text-white font-bold rounded-3xl border-2 border-black">Surprise Me</button>
    <button onclick="copyKaomoji()" class="px-6 py-2 bg-green-500 hover:bg-green-700 text-white font-bold rounded-3xl border-2 border-black">Copy</button>
  </div>

  <div class="flex flex-col md:flex-row gap-4 items-center justify-center mt-4">
    <input type="number" id="bulkCount" value="100" min="1" max="1000" class="p-2 border rounded-lg text-center w-32">
    <button onclick="generateBulkKaomoji()" class="px-6 py-2 bg-blue-500 hover:bg-blue-700 text-white font-bold rounded-3xl border-2 border-black">Generate Many</button>
    <button onclick="copyAllKaomoji()" class="px-6 py-2 bg-yellow-500 hover:bg-yellow-700 text-white font-bold rounded-3xl border-2 border-black">Copy All</button>
  </div>

  <div id="bulkOutput" class="bg-gray-100 p-4 rounded-xl max-h-96 overflow-y-auto flex flex-wrap gap-2 no-scrollbar"></div>
</div>

<script>
/* === Emoticon data lists === */
const leftArms = ["(", "пјҲ", "в•°(", "(гҒҘ", "(гҒЈ", "(пҫү", "гғҪ(", "К•", "гғҫ", "Оө", "Щ©(", "(*", "(вҢ’", "в•ӯ(", "ајј", "б•Ұ(", "б•Ө(", "вҠӮ(", "вҠғ(", "бғҡ(", "д№Ғ(", "ајј(", "в””(", "в—•(", "гғҳ(", "(вү§ПүвүҰ)", "(вҖўПүвҖў)", "(гҒЈВҙв–Ҫ`)гҒЈ", "(в•ҜвҖҝв•°)", "(а№‘вҖўМҖг…ӮвҖўМҒ)ЩҲвң§", "(гҒЈпјҫв–ҝпјҫ)рҹ’Ё", "К•вҖўбҙҘвҖўК”", "(вү§в–ҪвүҰ)/", "гғҪ(Вҙв–ҪпҪҖ)гғҺ", "(вҢ’вҖҝвҢ’)", "(/вҖў-вҖў)/"];
const rightArms = [")", "пјү", ")в•Ҝ", ")гҒҘ", ")гҒЈ", ")пҫү", ")гғҺ", "К”", "пҫү", "Щ©)", "(*", ")вҢ’", ")в•®", "ајҪ", "б•Ҙ)", "б• )", "вҠӮ)", "вҠғ)", "бғҡ)", "гғҳ)", "(вү§ПүвүҰ)", "(вҖўПүвҖў)", "(гҒЈВҙв–Ҫ`)гҒЈ", "(в•ҜвҖҝв•°)", "(а№‘вҖўМҖг…ӮвҖўМҒ)ЩҲвң§", "(гҒЈпјҫв–ҝпјҫ)рҹ’Ё", "К•вҖўбҙҘвҖўК”", "(вү§в–ҪвүҰ)/", "гғҪ(Вҙв–ҪпҪҖ)гғҺ", "(вҢ’вҖҝвҢ’)", "(/вҖў-вҖў)/"];
const eyesList = ["вҳү","^","В°","вҖў","В¬","аІ ","Вҙ","x","X","T","аІҘ","вҠҷ","в—•","в—”","вҖў","o","u","в—ү","вҲӘ","вҢ’","вҲҳ","вҢЈ","пҪЎ","лҲҲ","гӢЎ","аІ _аІ ","В¬_В¬","лҲҲ_лҲҲ","аІҘ_аІҘ","аІҘп№ҸаІҘ","вҖўМҒпёҝвҖўМҖ","лҲҲвҖёлҲҲ","вҖўМҖoвҖўМҒ","вҠҡ_вҠҡ","аІ вҖҝаІ ","вҖўвҖҝвҖў","вҖўаёҙ_вҖўаёҙ","вҖўпёөвҖў","вҠҷпёҝвҠҷ","вҰҝ_вҰҝ","вҖўМҖ_вҖўМҒ","лҲҲ_зӣҠлҲҲ","КҳвҖҝКҳ","вҢҗв– _в– ","вҢҗ_в– "];
const mouths = ["вҖҝ","_","o","O","Пү","п№Ҹ","в–і","вҲҖ","3","пёҝ","Р”","зҡҝ","зӣҠ","Рҙ","Оө","Р·","v","в–ҫ","б—қ","в–Ў","в•Ҝ","~","в–Ҫ","вҲҮ","гғҳ","гғӯ","п№Ҹ","еҸЈ","ЪЎ","Оө","Р·","Ві","вҖё","вӢҸ","б„Ҫ","п№ғ","пёө","пё¶","Пғ","пёә","пёё","пё№","зӣҠ","зҡҝ","вҢ’","в•®","в—Ү","бғҰ","вҲҮ","п№ҸПүп№Ҹ"];
const cheeks = ["","///","пҪҖ","Вҙ","вңҝ","o","пҪЎ","В°","*",".","~","бғҰ","вқҒ","вү§","вүҰ","в—•","в—”","вҠҷ","вҢ’","^","Вҙ","пҝЈ","пҪҖ","пҪҘ","вҖў","гҖғ","пјһ","<","вү§","вүӨ","вүҰ","пҝЈ",">_<","^_^",">_o","o_o","T_T","Q_Q","^_~","u_u"];
const extras = ["","гғҺ","!","?","^.^","(гҒЈЛҳР·(ЛҳвҢЈЛҳ )","!","?","вҳҶпҫҹ.*пҪҘпҪЎпҫҹ","(в•ҜВ°в–ЎВ°пјүв•Ҝпёө в”»в”Ғв”»","ВҜ\\_(гғ„)_/ВҜ","(пҪЎвҷҘвҖҝвҷҘпҪЎ)","(аІҘп№ҸаІҘ)","(вҖў_вҖў)","(гҒҘпҪЎв—•вҖҝвҖҝв—•пҪЎ)гҒҘ","(в•№в—Ўв•№)","(вү§в—ЎвүҰ)","(В¬вҖҝВ¬)","(В¬_В¬)","(пҝЈгғјпҝЈ)","(>_<)","(^_^;)","(гғ»_гғ»)","(аІ вҖҝаІ )","(пҝЈв–ҪпҝЈ)","(пҪЎв—•вҖҝв—•пҪЎ)","(пҝЈпёҝпҝЈ)","(вү§ПүвүҰ)","(ВҙпјӣПүпјӣ`)"];

/* helpers */
function getRandom(list){ return list[Math.floor(Math.random()*list.length)]; }
function generateKaomojiString(random=false){
  const singleMode = document.getElementById('singleSymbolMode').checked;
  const l = random ? getRandom(leftArms) : document.getElementById('leftArm').value;
  const e = random ? getRandom(eyesList) : document.getElementById('eyes').value;
  const m = random ? getRandom(mouths) : document.getElementById('mouth').value;
  const c = random ? getRandom(cheeks) : document.getElementById('cheeks').value;
  const r = random ? getRandom(rightArms) : document.getElementById('rightArm').value;
  const ex = random ? getRandom(extras) : document.getElementById('extra').value;
  if (singleMode) return ex || "";
  const k = `${l}${e}${c}${m}${c}${e}${r}${ex}`.trim();
  return k === "" ? "(вҳүвҖҝвҳү)" : k;
}

const outputEl = document.getElementById('output');
function updateOutput(flash=true){
  const kaomoji = generateKaomojiString(false);
  outputEl.textContent = kaomoji;
  if (flash){ outputEl.classList.add('pop'); setTimeout(()=>outputEl.classList.remove('pop'),120); }
}

function fillSelect(id, arr, defaultVal=""){
  const sel = document.getElementById(id);
  sel.innerHTML = "";
  arr.forEach(item => { const opt=document.createElement('option'); opt.value=item; opt.textContent=item||"None"; sel.appendChild(opt); });
  if (defaultVal !== undefined && defaultVal !== null) sel.value = defaultVal;
}

function addAutoUpdateListeners(){
  ['leftArm','rightArm','eyes','mouth','cheeks','extra'].forEach(id => {
    const el = document.getElementById(id);
    if(el){ el.addEventListener('change',()=>updateOutput(true)); el.addEventListener('input',()=>updateOutput(false)); }
  });
  document.getElementById('singleSymbolMode').addEventListener('change',()=>updateOutput(true));
}

function surpriseMe(){ updateOutput(true); outputEl.textContent = generateKaomojiString(true); }
function copyKaomoji(){ navigator.clipboard.writeText(outputEl.textContent).catch(()=>{}); }
function generateBulkKaomoji(){
  const count = Math.max(1, Math.min(1000, parseInt(document.getElementById('bulkCount').value||100)));
  const bulkDiv=document.getElementById('bulkOutput'); bulkDiv.innerHTML="";
  const frag=document.createDocumentFragment();
  for(let i=0;i<count;i++){
    const k=generateKaomojiString(true);
    const span=document.createElement('span');
    span.textContent=k; span.className="kaomoji-item p-1 rounded-md";
    span.style.marginRight="6px"; span.style.marginBottom="6px";
    span.onclick=()=>{ outputEl.textContent=k; outputEl.classList.add('pop'); setTimeout(()=>outputEl.classList.remove('pop'),120); };
    frag.appendChild(span);
  }
  bulkDiv.appendChild(frag);
}
function copyAllKaomoji(){
  const all = Array.from(document.getElementById('bulkOutput').children).map(c=>c.textContent).join("\n");
  if(all) navigator.clipboard.writeText(all).catch(()=>{});
}

/* Populate selects and wire listeners */
fillSelect("leftArm", leftArms, "(");
fillSelect("rightArm", rightArms, ")");
fillSelect("eyes", eyesList, "вҳү");
fillSelect("mouth", mouths, "вҖҝ");
fillSelect("cheeks", cheeks, "");
fillSelect("extra", extras, "");
addAutoUpdateListeners();
updateOutput(false);
</script>
</body>
</html>
